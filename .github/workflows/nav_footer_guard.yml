name: nav-footer-guard

on:
  push:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: ./build.sh

      - name: NAV+FOOTER guard
        run: bash -euo pipefail scripts/nav_footer_guard.sh --dist
